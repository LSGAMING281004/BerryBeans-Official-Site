server.port=8080

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/berrybeans;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true

# H2 Console configuration (useful for local debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
app.jwt.secret=9B8V7C6X5Z4A3S2D1F0G9H8J7K6L5M4N3B2V1C0X9Z8A7S6D5F4G3H2J1K0L9M8N
app.jwt.expiration-ms=86400000

# CORS
